<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFinance - Gestão de Folha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./script.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-3xl font-bold text-blue-600 mb-6">Folha de Pagamento - TechFinance</h1>

        <div class="mb-8 p-4 bg-blue-50 border-l-4 border-blue-400 rounded">
            <h2 class="font-bold text-blue-800">Teste de Conexão (CORS)</h2>
            <button onclick="testarConexao()" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                Verificar API
            </button>
            <p id="statusCORS" class="mt-2 text-sm font-medium"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <input id="nome" type="text" placeholder="Nome do Funcionário" class="border p-2 rounded w-full">
            <input id="cargo" type="text" placeholder="Cargo" class="border p-2 rounded w-full">
            <input id="salario" type="number" placeholder="Salário Base" class="border p-2 rounded w-full">
            <button onclick="cadastrar()" class="md:col-span-3 bg-green-600 text-white font-bold py-2 rounded hover:bg-green-700">
                Cadastrar Funcionário
            </button>
        </div>

        <hr class="my-6">

        <div>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-700">Funcionários Cadastrados</h2>
                <button onclick="carregarFuncionarios()" class="text-blue-600 hover:underline">Atualizar Lista</button>
            </div>
                <div id="lista" class="space-y-4">
            </div>
        </div>
    

    </body>
    </html>
